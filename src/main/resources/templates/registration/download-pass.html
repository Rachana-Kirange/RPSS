<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Pass | Eventra</title>
    <link rel="stylesheet" th:href="@{/css/site.css}">
</head>
<body>
<div class="page-shell">
    <header class="topbar">
        <a class="brand" th:href="@{/}">Event<span>ra</span></a>
        <nav class="nav">
            <a th:href="@{/registrations/{registrationId}/pass(registrationId=${registration.registrationId})}">Back to Pass</a>
            <a th:href="@{/dashboard}">Dashboard</a>
        </nav>
    </header>

    <main class="content-card" style="padding: 36px; margin-top: 16px;">
        <h2>Download Pass</h2>
        <p class="muted" th:text="${registration.event.title}">Event title</p>
        <div class="grid-card">
            <h3>Pass File Path</h3>
            <p class="muted" th:text="${passPath}">path</p>
        </div>
    </main>
</div>
</body>
</html>
