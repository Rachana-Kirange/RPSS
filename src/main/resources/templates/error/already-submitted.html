<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Already Submitted | Eventra</title>
    <link rel="stylesheet" th:href="@{/css/site.css}">
</head>
<body>
<div class="page-shell">
    <header class="topbar">
        <a class="brand" th:href="@{/}">Event<span>ra</span></a>
        <nav class="nav">
            <a th:href="@{/events}">Events</a>
            <a th:href="@{/dashboard}">Dashboard</a>
        </nav>
    </header>
    <main class="content-card" style="padding: 36px; margin-top: 16px;">
        <h2>Feedback Already Submitted</h2>
        <p class="muted" th:text="${error != null ? error : 'You have already submitted feedback for this event.'}">Already submitted</p>
        <a class="button-link primary" th:href="@{/dashboard}">Back to Dashboard</a>
    </main>
</div>
</body>
</html>
