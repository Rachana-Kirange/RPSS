<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Eventra</title>
    <link rel="stylesheet" th:href="@{/css/site.css}">
</head>
<body>
<div class="page-shell">
    <header class="topbar">
        <a class="brand" th:href="@{/}">Event<span>ra</span></a>
        <nav class="nav">
            <a th:href="@{/}">Home</a>
            <a th:href="@{/about}">About</a>
            <a th:href="@{/faq}">FAQ</a>
        </nav>
    </header>

    <main class="content-card" style="padding: 36px;">
        <div class="section-head">
            <div>
                <h2>Contact</h2>
                <p>Use these placeholders for your college support details until you wire live contact content.</p>
            </div>
        </div>
        <div class="grid-3">
            <section class="grid-card">
                <h3>General Help</h3>
                <p class="muted">support@rpss.edu</p>
            </section>
            <section class="grid-card">
                <h3>Admin Office</h3>
                <p class="muted">RPSS Campus Administration Desk</p>
            </section>
            <section class="grid-card">
                <h3>Hours</h3>
                <p class="muted">Monday to Saturday, 9:00 AM to 5:00 PM</p>
            </section>
        </div>
    </main>
</div>

</html>
