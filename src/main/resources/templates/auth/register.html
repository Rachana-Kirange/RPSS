<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Eventra</title>
    <style>
        :root {
            --bg: linear-gradient(140deg, #f7f4ea 0%, #e3eef7 100%);
            --card: rgba(255, 255, 255, 0.94);
            --text: #1f2933;
            --muted: #5f6c7b;
            --primary: #b45309;
            --primary-dark: #92400e;
            --border: rgba(31, 41, 51, 0.12);
            --danger: #b91c1c;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Georgia, "Times New Roman", serif;
            background: var(--bg);
            color: var(--text);
            padding: 24px;
        }

        .wrap {
            width: min(760px, 100%);
            margin: 0 auto;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 36px;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(2.2rem, 4vw, 3.6rem);
            line-height: 0.95;
        }

        .intro {
            margin: 0 0 28px;
            color: var(--muted);
            line-height: 1.6;
        }

        form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .full {
            grid-column: 1 / -1;
        }

        label {
            display: grid;
            gap: 8px;
            font-weight: 600;
            font-size: 0.95rem;
        }

        input,
        select {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.95);
            font: inherit;
        }

        input:focus,
        select:focus {
            outline: 2px solid rgba(180, 83, 9, 0.16);
            border-color: var(--primary);
        }

        .error-box {
            grid-column: 1 / -1;
            padding: 12px 14px;
            border-radius: 14px;
            background: #fee2e2;
            color: #991b1b;
            font-size: 0.95rem;
        }

        .field-error {
            color: var(--danger);
            font-size: 0.85rem;
            font-weight: 500;
        }

        button {
            grid-column: 1 / -1;
            border: 0;
            border-radius: 16px;
            padding: 14px 18px;
            background: var(--primary);
            color: white;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        button:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .footer {
            margin-top: 18px;
            color: var(--muted);
        }

        .footer a {
            color: var(--primary-dark);
            text-decoration: none;
            font-weight: 700;
        }

        @media (max-width: 700px) {
            .wrap {
                padding: 24px;
            }

            form {
                grid-template-columns: 1fr;
            }

            .full,
            button {
                grid-column: auto;
            }
        }
    </style>
</head>
<body>
<main class="wrap">
    <h1>Create Your Account</h1>
    <p class="intro">Register as a participant, club head, or admin account and sign in through the Eventra portal.</p>

    <form th:action="@{/auth/register}" method="post">
        <div th:if="${error}" class="error-box" th:text="${error}"></div>

        <label for="name" class="full">
            Full Name
            <input id="name" name="name" type="text" placeholder="Your full name" required>
        </label>

        <label for="email">
            Email
            <input id="email" name="email" type="email" placeholder="you@example.com" required>
        </label>

        <label for="phone">
            Phone
            <input id="phone" name="phone" type="text" placeholder="10 digit number" required>
        </label>

        <label for="role">
            Role
            <select id="role" name="role" required>
                <option value="">Select role</option>
                <option th:each="role : ${roles}" th:value="${role.name()}" th:text="${role.description}"></option>
            </select>
        </label>

        <label for="password">
            Password
            <input id="password" name="password" type="password" placeholder="Create password" required>
        </label>

        <label for="confirmPassword" class="full">
            Confirm Password
            <input id="confirmPassword" name="confirmPassword" type="password" placeholder="Repeat password" required>
        </label>

        <button type="submit">Register</button>
    </form>

    <div class="footer">
        Already have an account? <a th:href="@{/auth/login}">Login here</a>
    </div>
</main>
</body>
</html>
