<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Event | Eventra</title>
    <link rel="stylesheet" th:href="@{/css/site.css}">
</head>
<body>
<div class="page-shell">
    <header class="topbar">
        <a class="brand" th:href="@{/}">Event<span>ra</span></a>
        <nav class="nav">
            <a th:href="@{/dashboard}">Dashboard</a>
            <a th:href="@{/events}">Events</a>
        </nav>
    </header>

    <main class="content-card" style="padding: 36px; margin-top: 18px;">
        <div class="section-head">
            <div>
                <h2>Create Event Proposal</h2>
                <p th:if="${club != null}">Submitting for <strong th:text="${club.clubName}">Club</strong>.</p>
            </div>
        </div>

        <div th:if="${error}" class="error-box" style="margin-bottom: 16px;" th:text="${error}"></div>

        <form th:action="@{/events/create}" th:object="${eventCreateDTO}" method="post" style="display:grid; gap:16px;">
            <label>
                Event Title
                <input type="text" th:field="*{title}" required>
            </label>

            <label>
                Description
                <textarea th:field="*{description}" rows="6" style="padding:14px 16px; border-radius:14px; border:1px solid var(--line); font:inherit;"></textarea>
            </label>

            <div class="grid-2">
                <label>
                    Date & Time
                    <input type="datetime-local" th:field="*{eventDateTime}" required>
                </label>

                <label>
                    Venue
                    <input type="text" th:field="*{venue}" required>
                </label>
            </div>

            <label>
                Max Capacity
                <input type="number" th:field="*{maxCapacity}" min="5" required>
            </label>

            <fieldset style="border:1px solid var(--line); border-radius:14px; padding:16px; background-color:rgba(0,0,0,0.02);">
                <legend style="font-weight:600; padding:0 8px;">Event Options</legend>

                <label style="display:flex; align-items:center; gap:8px; margin-bottom:12px;">
                    <input type="checkbox" th:field="*{requiresQR}" value="true">
                    <span>Require QR Code for attendance</span>
                </label>

                <label style="display:flex; align-items:center; gap:8px;">
                    <input type="checkbox" th:field="*{requiresPayment}" value="true" id="paymentCheckbox">
                    <span>Payment Required</span>
                </label>

                <label id="paymentAmountLabel" style="display:none; margin-top:12px;">
                    Payment Amount (₹)
                    <input type="number" th:field="*{paymentAmount}" min="1" step="0.01" placeholder="0.00">
                </label>
            </fieldset>

            <label>
                Activity Proposal
                <textarea th:field="*{activityProposal}" rows="4" placeholder="Describe the activity/event proposal for admin review..." style="padding:14px 16px; border-radius:14px; border:1px solid var(--line); font:inherit;"></textarea>
            </label>

            <script>
                // Show/hide payment amount based on checkbox
                const paymentCheckbox = document.getElementById('paymentCheckbox');
                const paymentAmountLabel = document.getElementById('paymentAmountLabel');
                
                function togglePaymentAmount() {
                    paymentAmountLabel.style.display = paymentCheckbox.checked ? 'block' : 'none';
                }
                
                paymentCheckbox.addEventListener('change', togglePaymentAmount);
                togglePaymentAmount(); // Initial state
            </script>

            <button type="submit">Submit Event</button>
        </form>
    </main>
</div>
</body>
</html>
