<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Events | Club Head</title>
    <link rel="stylesheet" th:href="@{/css/site.css}">
    <style>
        .events-grid {
            align-items: stretch;
        }

        .event-card {
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-height: 100%;
            overflow: hidden;
        }

        .event-title {
            margin: 0;
            line-height: 1.3;
            word-break: break-word;
            overflow-wrap: anywhere;
        }

        .event-desc {
            margin: 0;
            line-height: 1.45;
            max-height: 5.8em;
            overflow: hidden;
            word-break: break-word;
            overflow-wrap: anywhere;
        }

        .event-meta {
            margin: 0;
            word-break: break-word;
            overflow-wrap: anywhere;
        }

        .event-card .button-link {
            margin-top: auto;
            align-self: flex-start;
        }
    </style>
</head>
<body>
<div class="page-shell">
    <header class="topbar">
        <a class="brand" th:href="@{/}">Event<span>ra</span></a>
        <nav class="nav">
            <a th:href="@{/clubhead/dashboard}">Dashboard</a>
            <a th:href="@{/events/create}">Create Event</a>
            <a th:href="@{/auth/logout}">Logout</a>
        </nav>
    </header>

    <main class="content-card" style="padding: 32px; margin-top: 18px;">
        <div class="section-head" style="margin-bottom: 20px;">
            <div>
                <h2>All Events</h2>
                <p th:if="${club != null}" th:text="${'Club: ' + club.clubName}">Club Name</p>
            </div>
            <div class="badge" th:text="${'Total: ' + totalEvents}">Total: 0</div>
        </div>

        <div th:if="${#lists.isEmpty(events)}" class="empty-state">
            No events found. Create your first event to get started.
        </div>

        <div th:unless="${#lists.isEmpty(events)}" class="grid-3 events-grid">
            <article class="grid-card event-card" th:each="event : ${events}">
                <div class="badge" th:text="${event.status}">PENDING</div>
                <h3 class="event-title" th:text="${event.title}">Event Title</h3>
                <p class="muted event-desc" th:text="${event.description}">Description</p>
                <p class="simple-meta event-meta">
                    <strong>Date:</strong> <span th:text="${#temporals.format(event.eventDate, 'MMM dd, yyyy HH:mm')}">date</span><br>
                    <strong>Venue:</strong> <span th:text="${event.venue}">venue</span><br>
                    <strong>Registrations:</strong> <span th:text="${event.registrationCount + ' / ' + event.maxCapacity}">0 / 100</span>
                </p>

                <a class="button-link primary" th:href="@{/clubhead/events/{id}(id=${event.eventId})}">Show Details</a>
            </article>
        </div>
    </main>
</div>
</body>
</html>
