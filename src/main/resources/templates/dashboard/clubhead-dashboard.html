<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Head Dashboard | Eventra</title>
    <link rel="stylesheet" th:href="@{/css/site.css}">
</head>
<body>
<div class="page-shell">
    <header class="topbar">
        <a class="brand" th:href="@{/}">Event<span>ra</span></a>
        <nav class="nav">
            <a th:href="@{/events/create}">Create Event</a>
            <a th:href="@{/auth/logout}">Logout</a>
        </nav>
    </header>

    <main class="dashboard-shell page-stack">
        <section class="dashboard-head">
            <div>
                <h1 th:text="${club.clubName}">Club Dashboard</h1>
                <p th:text="${club.description}">Club description</p>
            </div>
            <div class="stat-chip-row">
                <div class="stat-chip">Club Head: <strong th:text="${club.clubHeadName}">Name</strong></div>
            </div>
        </section>

        <section class="grid-4">
            <article class="grid-card tone-teal">
                <h3>Total Events</h3>
                <p class="metric" th:text="${totalEvents}">0</p>
            </article>
            <article class="grid-card tone-amber">
                <h3>Pending</h3>
                <p class="metric" th:text="${pendingEvents}">0</p>
            </article>
            <article class="grid-card tone-blue">
                <h3>Approved</h3>
                <p class="metric" th:text="${approvedEvents}">0</p>
            </article>
            <article class="grid-card tone-green">
                <h3>Registrations</h3>
                <p class="metric" th:text="${totalRegistrations}">0</p>
            </article>
        </section>

        <section class="list-card">
            <h3>Club Event Pipeline</h3>
            <div th:if="${#lists.isEmpty(events)}" class="empty-state">
                No events have been created for this club yet.
            </div>
            <div th:unless="${#lists.isEmpty(events)}" class="event-list">
                <div class="event-item" th:each="event : ${events}">
                    <h4 th:text="${event.title}">Event title</h4>
                    <div class="event-meta">
                        <strong>Status:</strong> <span th:text="${event.status}">PENDING</span><br>
                        <strong>Date:</strong> <span th:text="${event.eventDate}">date</span><br>
                        <strong>Venue:</strong> <span th:text="${event.venue}">venue</span><br>
                        <strong>Capacity:</strong> <span th:text="${event.maxCapacity}">0</span>
                    </div>
                </div>
            </div>
        </section>
    </main>
</div>
</body>
</html>
