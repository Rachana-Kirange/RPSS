<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Review Report - Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px 30px;
        }

        .card-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .card-header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .card-body {
            padding: 30px;
        }

        .event-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            background-color: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .info-field {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-weight: 600;
            color: #333;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .info-value {
            color: #666;
            font-size: 14px;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-pending {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }

        .status-approved {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-rejected {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status-revisions {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .report-section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .report-content {
            background-color: #f9f9f9;
            padding: 20px;
            border-left: 4px solid #667eea;
            border-radius: 5px;
            line-height: 1.6;
            color: #555;
            min-height: 150px;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            min-height: 100px;
            transition: border-color 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .error-message {
            background-color: #fee;
            border: 1px solid #fcc;
            border-radius: 5px;
            color: #c00;
            padding: 15px;
            margin-bottom: 20px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button, a.btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .btn-approve {
            background-color: #28a745;
            color: white;
        }

        .btn-approve:hover {
            background-color: #218838;
            transform: translateY(-2px);
        }

        .btn-reject {
            background-color: #dc3545;
            color: white;
        }

        .btn-reject:hover {
            background-color: #c82333;
            transform: translateY(-2px);
        }

        .btn-revisions {
            background-color: #ffc107;
            color: #333;
        }

        .btn-revisions:hover {
            background-color: #e0a800;
            transform: translateY(-2px);
        }

        .btn-cancel {
            background-color: #6c757d;
            color: white;
        }

        .btn-cancel:hover {
            background-color: #5a6268;
        }

        .hidden-input {
            display: none;
        }

        @media (max-width: 768px) {
            .event-info {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            button, a.btn {
                flex: 1;
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-header">
                <h1>Review Event Report</h1>
                <p th:text="'Event: ' + ${event.title}"></p>
            </div>

            <div class="card-body">
                <!-- Error Message -->
                <div th:if="${error}" class="error-message" th:text="${error}"></div>

                <!-- Event Information -->
                <div class="event-info">
                    <div class="info-field">
                        <span class="info-label">Event Title</span>
                        <span class="info-value" th:text="${event.title}"></span>
                    </div>
                    <div class="info-field">
                        <span class="info-label">Club</span>
                        <span class="info-value" th:text="${event.club.clubName}"></span>
                    </div>
                    <div class="info-field">
                        <span class="info-label">Event Date</span>
                        <span class="info-value" th:text="${#temporals.format(event.eventDate, 'dd MMM yyyy HH:mm')}"></span>
                    </div>
                    <div class="info-field">
                        <span class="info-label">Created By</span>
                        <span class="info-value" th:text="${event.createdBy.name}"></span>
                    </div>
                    <div class="info-field">
                        <span class="info-label">Report Status</span>
                        <span class="status-badge" 
                              th:classappend="${reportStatus == null or reportStatus.name() == 'PENDING'} ? 'status-pending' : 
                                              ${reportStatus.name() == 'APPROVED'} ? 'status-approved' : 
                                              ${reportStatus.name() == 'REJECTED'} ? 'status-rejected' : 
                                              'status-revisions'"
                              th:text="${reportStatus != null} ? ${reportStatus.displayName} : 'Pending'">
                        </span>
                    </div>
                    <div class="info-field" th:if="${event.reportSubmittedDate}">
                        <span class="info-label">Report Submitted</span>
                        <span class="info-value" th:text="${#temporals.format(event.reportSubmittedDate, 'dd MMM yyyy HH:mm')}"></span>
                    </div>
                </div>

                <!-- Report Content -->
                <div class="report-section" th:if="${report}">
                    <h3 class="section-title">📋 Event Report</h3>
                    <div class="report-content" th:text="${report}">
                        No report content available
                    </div>
                </div>

                <!-- Review Form -->
                <div class="report-section">
                    <h3 class="section-title">✏️ Review Comments</h3>
                    <form method="POST" th:action="@{/admin/reports/{id}/review(id=${event.eventId})}">
                        <div class="form-group">
                            <label for="comments">Comments (Optional)</label>
                            <textarea id="comments" name="comments" placeholder="Add your review comments here..."></textarea>
                        </div>

                        <div class="button-group">
                            <button type="submit" name="action" value="approve" class="btn-approve">✓ Approve Report</button>
                            <button type="submit" name="action" value="revisions" class="btn-revisions">✎ Request Revisions</button>
                            <button type="submit" name="action" value="reject" class="btn-reject">✗ Reject Report</button>
                            <a href="/admin/reports" class="btn btn-cancel">← Back</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
