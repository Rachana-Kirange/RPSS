<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pending Event Reviews | Eventra</title>
    <link rel="stylesheet" th:href="@{/css/site.css}">
</head>
<body>
<div class="page-shell">
    <header class="topbar">
        <a class="brand" th:href="@{/}">Event<span>ra</span></a>
        <nav class="nav">
            <a th:href="@{/dashboard}">Dashboard</a>
            <a th:href="@{/admin/reports}">Reports</a>
        </nav>
    </header>

    <main class="content-card" style="padding: 36px; margin-top: 16px;">
        <h2>Pending Event Reviews</h2>
        <div th:if="${#lists.isEmpty(pendingEvents)}" class="empty-state">No pending events to review.</div>
        <div th:unless="${#lists.isEmpty(pendingEvents)}" class="event-list">
            <div class="event-item" th:each="event : ${pendingEvents}">
                <h4 th:text="${event.title}">Event</h4>
                <div class="event-meta">
                    <strong>Club:</strong> <span th:text="${event.club.clubName}">club</span><br>
                    <strong>Date:</strong> <span th:text="${event.eventDate}">date</span><br>
                    <strong>Venue:</strong> <span th:text="${event.venue}">venue</span>
                </div>
                <a class="button-link primary" th:href="@{/admin/events/{eventId}/review(eventId=${event.eventId})}">Open Review</a>
            </div>
        </div>
    </main>
</div>
</body>
</html>
