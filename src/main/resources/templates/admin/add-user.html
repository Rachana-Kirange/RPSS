<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add User | Eventra</title>
    <link rel="stylesheet" th:href="@{/css/site.css}">
</head>
<body>
<div class="page-shell">
    <header class="topbar">
        <a class="brand" th:href="@{/}">Event<span>ra</span></a>
        <nav class="nav">
            <a th:href="@{/admin/users}">Manage Users</a>
            <a th:href="@{/dashboard}">Dashboard</a>
        </nav>
    </header>

    <main class="content-card" style="padding: 36px; margin-top: 16px;">
        <h2>Add New User</h2>
        <div th:if="${error}" class="error-box" style="margin-bottom: 16px;" th:text="${error}"></div>
        <form th:action="@{/admin/users/add}" th:object="${userRegistrationDTO}" method="post" style="display:grid; gap:16px;">
            <div class="grid-2">
                <label>
                    Name
                    <input type="text" th:field="*{name}" required>
                </label>
                <label>
                    Email
                    <input type="email" th:field="*{email}" required>
                </label>
            </div>
            <div class="grid-2">
                <label>
                    Phone
                    <input type="text" th:field="*{phone}" required>
                </label>
                <label>
                    Role
                    <select th:field="*{role}" required>
                        <option value="">Select role</option>
                        <option th:each="role : ${roles}" th:value="${role}" th:text="${role}"></option>
                    </select>
                </label>
            </div>
            <div class="grid-2">
                <label>
                    Password
                    <input type="password" th:field="*{password}" required>
                </label>
                <label>
                    Confirm Password
                    <input type="password" th:field="*{confirmPassword}" required>
                </label>
            </div>
            <button type="submit">Create User</button>
        </form>
    </main>
</div>
</body>
</html>
